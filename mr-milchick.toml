# Flavor manifest loaded at runtime.
# This file is intentionally minimal and only contains settings
# that the application actually reads from TOML today.
notification_policy = "always"

[platform_connector]
kind = "gitlab"

# Optional Slack notifications:
 [[notifications]]
 kind = "slack-workflow"
 enabled = true

 [[notifications]]
 kind = "slack-app"
 enabled = true

# [slack_app.user_map]
