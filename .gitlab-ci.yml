workflow:
  rules:
    - if: '$CI_COMMIT_TAG'
    - when: never

stages:
  - verify
  - test
  - build
  - release

default:
  image: rust:1.86

variables:
  CARGO_TERM_COLOR: always
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  DEBIAN_FRONTEND: noninteractive
  GIT_DEPTH: "0"
  TZ: Etc/UTC

cache:
  key: "${CI_PROJECT_NAME}"
  paths:
    - target/
    - .cargo/

verify_release_tag:
  stage: verify
  image: alpine/git:2.47.2
  script:
    - git fetch origin master:refs/remotes/origin/master
    - git merge-base --is-ancestor "$CI_COMMIT_SHA" origin/master

test:
  stage: test
  needs: ["verify_release_tag"]
  script:
    - cargo test --workspace --locked

build_release_binary:
  stage: build
  needs: ["test"]
  before_script:
    - apt-get update
    - apt-get install -y -o Dpkg::Options::=--force-confold --no-install-recommends clang cmake libclang-dev llvm-dev pkg-config tzdata
    - export LIBCLANG_PATH="$(llvm-config --libdir)"
  script:
    - cargo build -p mr-milchick --release --locked --no-default-features --features "gitlab slack-app llm-local"
    - mkdir -p dist
    - cp target/release/mr-milchick dist/mr-milchick
    - cp mr-milchick.toml dist/mr-milchick.toml
    - chmod +x dist/mr-milchick
  artifacts:
    name: "mr-milchick-${CI_COMMIT_TAG}"
    paths:
      - dist/mr-milchick
      - dist/mr-milchick.toml
    expire_in: 90 days

release_binary:
  stage: release
  image: registry.gitlab.com/gitlab-org/cli:latest
  needs:
    - job: build_release_binary
      artifacts: true
  script:
    - echo "Creating GitLab release for ${CI_COMMIT_TAG}"
  artifacts:
    name: "mr-milchick-${CI_COMMIT_TAG}"
    paths:
      - dist/mr-milchick
      - dist/mr-milchick.toml
    expire_in: 90 days
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "mr-milchick $CI_COMMIT_TAG"
    description: "Release $CI_COMMIT_TAG"
    assets:
      links:
        - name: "mr-milchick (linux x86_64 gnu)"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/dist/mr-milchick"
        - name: "mr-milchick.toml"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/dist/mr-milchick.toml"
