stages:
  - test
  - build
  - release

default:
  image: rust:1.86

variables:
  CARGO_TERM_COLOR: always

cache:
  key: "${CI_PROJECT_NAME}"
  paths:
    - target/
    - .cargo/

test:
  stage: test
  script:
    - cargo test --all --locked

build_release_binary:
  stage: build
  image: rust:1.86
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: always
    - when: never
  before_script:
    - rustup target add x86_64-unknown-linux-musl
    - apt-get update && apt-get install -y musl-tools pkg-config
  script:
    - cargo build --release --locked --target x86_64-unknown-linux-musl
    - mkdir -p dist
    - cp target/x86_64-unknown-linux-musl/release/mr-milchick dist/mr-milchick
    - chmod +x dist/mr-milchick
  artifacts:
    paths:
      - dist/mr-milchick
    expire_in: 30 days

release_binary:
  stage: release
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - echo "Release artifact prepared"
  artifacts:
    name: "mr-milchick-release-${CI_COMMIT_SHORT_SHA}"
    paths:
      - dist/mr-milchick
    expire_in: 90 days