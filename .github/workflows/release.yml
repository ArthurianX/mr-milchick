name: Release

on:
  push:
    tags:
      - "*"
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  verify_release_tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify tag commit is on master
        run: |
          git fetch origin master:refs/remotes/origin/master
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/master

  test:
    runs-on: ubuntu-latest
    needs: verify_release_tag
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cargo test --workspace --locked

  build_release_binaries:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: gitlab-slack
            features: "gitlab slack-app slack-workflow llm-local"
            include_flavor: true
            flavor_source: "mr-milchick.toml"
            flavor_asset: "mr-milchick-gitlab.toml"
          - artifact_name: github-slack
            features: "github slack-app slack-workflow llm-local"
            include_flavor: true
            flavor_source: "mr-milchick.github.toml"
            flavor_asset: "mr-milchick-github.toml"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools pkg-config
      - name: Build connector release artifact
        run: |
          cargo build -p mr-milchick --release --locked --target x86_64-unknown-linux-musl --no-default-features --features "${{ matrix.features }}"
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/mr-milchick "dist/mr-milchick-${{ matrix.artifact_name }}-linux-x86_64-musl"
          if [ "${{ matrix.include_flavor }}" = "true" ]; then
            cp "${{ matrix.flavor_source }}" "dist/${{ matrix.flavor_asset }}"
          fi
          chmod +x "dist/mr-milchick-${{ matrix.artifact_name }}-linux-x86_64-musl"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_name }}
          path: dist/*

  release:
    runs-on: ubuntu-latest
    needs: build_release_binaries
    steps:
      - name: Download GitLab Slack artifact
        uses: actions/download-artifact@v4
        with:
          name: release-gitlab-slack
          path: dist
      - name: Download GitHub Slack artifact
        uses: actions/download-artifact@v4
        with:
          name: release-github-slack
          path: dist
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
              --title "mr-milchick ${GITHUB_REF_NAME}" \
              --notes "Release ${GITHUB_REF_NAME}"

          gh release upload "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
            dist/mr-milchick-gitlab-slack-linux-x86_64-musl \
            dist/mr-milchick-gitlab.toml \
            dist/mr-milchick-github-slack-linux-x86_64-musl \
            dist/mr-milchick-github.toml \
            --clobber
